spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pomodoro}
    username: ${SPRING_DATASOURCE_USERNAME:pomodoro}
    password: ${SPRING_DATASOURCE_PASSWORD:pomodoro}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-with-at-least-32-bytes}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:30}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  ai:
    mode: ${AI_MODE:mock}
    openai-api-key: ${OPENAI_API_KEY:}
    text-model: ${OPENAI_MODEL:gpt-4.1-mini}
    vision-model: ${OPENAI_VISION_MODEL:gpt-4.1-mini}
    image-model: ${OPENAI_IMAGE_MODEL:gpt-image-1}
    use-web-image-feed: ${USE_WEB_IMAGE_FEED:true}
    ollama-api-url: ${OLLAMA_API_URL:http://ollama:11434}
    ollama-model: ${OLLAMA_MODEL:llama3.2:1b}
    local-image-api-url: ${LOCAL_IMAGE_API_URL:http://local-image:7860}
    local-image-steps: ${LOCAL_IMAGE_STEPS:4}
    web-image-api-url: ${WEB_IMAGE_API_URL:https://commons.wikimedia.org}
    image-timeout-seconds: ${AI_IMAGE_TIMEOUT_SECONDS:8}
    chat-timeout-seconds: ${AI_CHAT_TIMEOUT_SECONDS:60}
  uploads-dir: ${UPLOADS_DIR:uploads}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
