spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-test-secret-key-123456
    access-expiration-minutes: 30
    refresh-expiration-days: 7
  ai:
    mode: mock
    use-web-image-feed: true
    ollama-api-url: http://localhost:11434
    ollama-model: llama3.2:1b
    local-image-api-url: http://localhost:7860
    local-image-steps: 2
    web-image-api-url: https://commons.wikimedia.org
    image-timeout-seconds: 2
    chat-timeout-seconds: 30
  uploads-dir: target/test-uploads
