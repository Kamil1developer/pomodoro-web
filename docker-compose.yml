services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pomodoro}
      POSTGRES_USER: ${POSTGRES_USER:-pomodoro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pomodoro}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-ai"]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pomodoro}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pomodoro}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pomodoro}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-with-at-least-32-bytes}
      JWT_ACCESS_EXPIRATION_MINUTES: ${JWT_ACCESS_EXPIRATION_MINUTES:-30}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      AI_MODE: ${AI_MODE:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      LOCAL_IMAGE_API_URL: ${LOCAL_IMAGE_API_URL:-http://local-image:7860}
      LOCAL_IMAGE_STEPS: ${LOCAL_IMAGE_STEPS:-6}
      USE_WEB_IMAGE_FEED: ${USE_WEB_IMAGE_FEED:-true}
      WEB_IMAGE_API_URL: ${WEB_IMAGE_API_URL:-https://commons.wikimedia.org}
      AI_IMAGE_TIMEOUT_SECONDS: ${AI_IMAGE_TIMEOUT_SECONDS:-8}
      AI_CHAT_TIMEOUT_SECONDS: ${AI_CHAT_TIMEOUT_SECONDS:-60}
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
      TZ: ${APP_TIME_ZONE:-Europe/Moscow}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - postgres
    volumes:
      - backend_uploads:${UPLOADS_DIR:-/app/uploads}

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18080/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  pg_data:
  backend_uploads:
  ollama_data:
